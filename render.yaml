services:
  - type: worker
    name: sfor-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: GROQ_KEY
        sync: false
